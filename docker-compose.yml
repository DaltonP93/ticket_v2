version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-v2-postgres
    environment:
      POSTGRES_USER: ticket_v2
      POSTGRES_PASSWORD: ticket_v2
      POSTGRES_DB: ticket_v2
    ports:
      - "5433:5432"
    volumes:
      - ticket_v2_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticket-v2-redis
    ports:
      - "6380:6379"

volumes:
  ticket_v2_postgres:

